<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>文字点选验证码</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            padding: 36px 32px 28px;
            width: 440px;
            max-width: 100%;
        }

        .card-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .card-header h2 {
            font-size: 22px;
            color: #333;
            font-weight: 700;
        }
        .card-header p {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        /* 图片区域 */
        .image-area {
            position: relative;
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #e2e2e2;
            cursor: crosshair;
            user-select: none;
            width: fit-content;
            transition: border-color 0.2s;
        }
        .image-area:hover { border-color: #667eea; }
        .image-area img {
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* 点击标记 */
        .marker {
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(102, 126, 234, 0.85);
            border: 2px solid #fff;
            transform: translate(-50%, -50%);
            pointer-events: none;
            font-size: 12px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
            animation: popIn 0.2s ease;
        }
        @keyframes popIn {
            0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
        }

        /* 提示文字 */
        .prompt-bar {
            margin: 16px 0 8px;
            padding: 12px 16px;
            background: linear-gradient(135deg, #eef2ff, #e8ecff);
            border-radius: 10px;
            color: #4a5acf;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
            border: 1px solid #dde3ff;
        }

        /* 状态提示 */
        .status {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin: 8px 0 4px;
            min-height: 20px;
        }

        /* 按钮行 */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn:active { transform: scale(0.97); }

        .btn-clear   { background: #f5f5f5; color: #666; }
        .btn-clear:hover   { background: #ebebeb; }
        .btn-refresh { background: #f0f4ff; color: #4a5acf; }
        .btn-refresh:hover { background: #dfe6ff; }
        .btn-verify  { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .btn-verify:hover  { opacity: 0.9; }
        .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 结果提示 */
        .toast {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            display: none;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            0%   { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .toast.show   { display: block; }
        .toast.ok     { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
        .toast.err    { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

        /* 加载遮罩 */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            z-index: 10;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 调试信息（默认隐藏） */
        .debug-info {
            margin-top: 12px;
            padding: 8px 12px;
            background: #fafafa;
            border-radius: 8px;
            font-size: 11px;
            color: #bbb;
            text-align: center;
            display: none; /* 需要调试时改为 block */
        }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align:center;margin-bottom:12px;display:flex;gap:16px;justify-content:center;">
        <a href="slider.html" style="color:#667eea;text-decoration:none;font-size:13px;font-weight:600;">前往滑动解锁验证码 &rarr;</a>
        <a href="rotate.html" style="color:#667eea;text-decoration:none;font-size:13px;font-weight:600;">前往旋转验证码 &rarr;</a>
    </div>

    <div class="card-header">
        <h2>文字点选验证码</h2>
        <p>请在图片中按顺序点击指定的文字</p>
    </div>

    <div style="text-align:center;">
        <div class="image-area" id="imageArea">
            <img id="captchaImg" src="" alt="验证码" width="320" height="160"/>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <div class="prompt-bar" id="promptBar">加载中...</div>
    <div class="status" id="statusText"></div>

    <div class="btn-row">
        <button class="btn btn-clear"   id="clearBtn">清除点击</button>
        <button class="btn btn-refresh" id="refreshBtn">换一个</button>
        <button class="btn btn-verify"  id="verifyBtn" disabled>验证</button>
    </div>

    <div class="toast" id="toast"></div>
    <div class="debug-info" id="debugInfo"></div>
</div>

<script>
(function () {
    'use strict';

    // ── 常量 ──
    const API = 'http://127.0.0.1:8080/api/captcha';

    // ── 状态 ──
    let captchaId    = null;
    let targetChars  = [];
    let clicks       = [];

    // ── DOM ──
    const imageArea    = document.getElementById('imageArea');
    const captchaImg   = document.getElementById('captchaImg');
    const promptBar    = document.getElementById('promptBar');
    const statusText   = document.getElementById('statusText');
    const toast        = document.getElementById('toast');
    const verifyBtn    = document.getElementById('verifyBtn');
    const refreshBtn   = document.getElementById('refreshBtn');
    const clearBtn     = document.getElementById('clearBtn');
    const loadingEl    = document.getElementById('loadingOverlay');
    const debugInfo    = document.getElementById('debugInfo');

    // ── 工具函数 ──
    function showLoading(show) {
        loadingEl.style.display = show ? 'flex' : 'none';
    }

    function showToast(msg, type) {
        toast.textContent = msg;
        toast.className = 'toast show ' + type;
    }

    function hideToast() {
        toast.className = 'toast';
    }

    function updateStatus() {
        const total = targetChars.length;
        statusText.textContent = '已点击 ' + clicks.length + ' / ' + total + ' 个目标';
        verifyBtn.disabled = (clicks.length !== total || !captchaId);
    }

    // ── 加载验证码 ──
    async function loadCaptcha() {
        clearClicks();
        hideToast();
        showLoading(true);
        promptBar.textContent = '加载中...';

        try {
            const resp = await fetch(API + '/generate');
            const json = await resp.json();

            if (json.code === 200 && json.data) {
                const d = json.data;
                captchaId   = d.captchaId;
                targetChars = d.targetChars || [];
                captchaImg.src = d.image;
                promptBar.textContent = d.promptText;
                debugInfo.textContent = 'ID: ' + d.captchaId + '  目标: ' + (d.targetChars || []).join(', ');
            } else {
                promptBar.textContent = '加载失败，请重试';
                showToast(json.message || '服务器异常', 'err');
            }
        } catch (e) {
            promptBar.textContent = '网络错误，请重试';
            showToast('无法连接到服务器', 'err');
        } finally {
            showLoading(false);
            updateStatus();
        }
    }

    // ── 清除点击 ──
    function clearClicks() {
        clicks = [];
        imageArea.querySelectorAll('.marker').forEach(function (m) { m.remove(); });
        hideToast();
        updateStatus();
    }

    // ── 图片点击 ──
    imageArea.addEventListener('click', function (e) {
        if (!captchaId) return;
        var total = targetChars.length;
        if (clicks.length >= total) return; // 已点满

        var rect = captchaImg.getBoundingClientRect();
        var scaleX = captchaImg.naturalWidth  / rect.width;
        var scaleY = captchaImg.naturalHeight / rect.height;
        var x = Math.round((e.clientX - rect.left) * scaleX);
        var y = Math.round((e.clientY - rect.top)  * scaleY);

        clicks.push({ x: x, y: y });

        // 绘制标记（使用相对于 imageArea 的 CSS 坐标）
        var marker = document.createElement('div');
        marker.className = 'marker';
        marker.style.left = (e.clientX - rect.left) + 'px';
        marker.style.top  = (e.clientY - rect.top)  + 'px';
        marker.textContent = clicks.length;
        imageArea.appendChild(marker);

        updateStatus();
    });

    // ── 验证 ──
    async function doVerify() {
        if (!captchaId) { showToast('请先加载验证码', 'err'); return; }
        var total = targetChars.length;
        if (clicks.length !== total) {
            showToast('请完成全部 ' + total + ' 次点击', 'err');
            return;
        }

        verifyBtn.disabled = true;

        try {
            var resp = await fetch(API + '/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ captchaId: captchaId, clicks: clicks })
            });
            var json = await resp.json();

            if (json.code === 200) {
                showToast(json.message || '验证通过！', 'ok');
                // 验证成功后 2 秒自动刷新
                setTimeout(loadCaptcha, 2000);
            } else {
                showToast(json.message || '验证失败', 'err');
                // 失败后 1.5 秒自动刷新
                setTimeout(loadCaptcha, 1500);
            }
        } catch (e) {
            showToast('网络错误，请重试', 'err');
        } finally {
            updateStatus();
        }
    }

    // ── 事件绑定 ──
    refreshBtn.addEventListener('click', loadCaptcha);
    clearBtn.addEventListener('click', clearClicks);
    verifyBtn.addEventListener('click', doVerify);

    // ── 初始化 ──
    loadCaptcha();
})();
</script>
</body>
</html>
