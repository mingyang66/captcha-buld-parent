<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>滑动解锁验证码</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .card {
            background: #fff; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            padding: 36px 32px 28px; width: 440px; max-width: 100%;
        }

        .card-header { text-align: center; margin-bottom: 24px; }
        .card-header h2 { font-size: 22px; color: #333; font-weight: 700; }
        .card-header p  { font-size: 13px; color: #999; margin-top: 4px; }

        .nav-links {
            text-align: center; margin-bottom: 16px;
            display: flex; gap: 16px; justify-content: center;
        }
        .nav-links a { color: #667eea; text-decoration: none; font-size: 13px; font-weight: 600; }
        .nav-links a:hover { text-decoration: underline; }

        /* ===== 图片区域 ===== */
        .image-area {
            position: relative; display: block; margin: 0 auto;
            border-radius: 10px; overflow: hidden;
            border: 2px solid #e2e2e2; user-select: none;
            width: fit-content; transition: border-color 0.2s;
        }
        .image-area:hover { border-color: #667eea; }
        .image-area.dragging { border-color: #667eea; box-shadow: 0 0 12px rgba(102,126,234,0.3); }
        .image-area.success  { border-color: #059669; box-shadow: 0 0 16px rgba(5,150,105,0.4); }
        .image-area.fail     { border-color: #dc2626; box-shadow: 0 0 16px rgba(220,38,38,0.4); }

        .image-area img.bg-img {
            display: block; user-select: none; -webkit-user-drag: none;
        }

        /* ===== 可拖拽的拼图块 ===== */
        .slider-piece {
            position: absolute; left: 0;
            cursor: grab; user-select: none; -webkit-user-drag: none;
            z-index: 5; touch-action: none;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
            transition: filter 0.2s;
        }
        .slider-piece:hover { filter: drop-shadow(2px 2px 6px rgba(102,126,234,0.5)); }
        .slider-piece.dragging {
            cursor: grabbing;
            filter: drop-shadow(3px 3px 8px rgba(0,0,0,0.4));
        }

        /* ===== 提示文字 ===== */
        .hint-bar {
            margin: 14px 0 4px; padding: 10px 16px;
            background: linear-gradient(135deg, #eef2ff, #e8ecff);
            border-radius: 10px; color: #4a5acf;
            font-size: 14px; font-weight: 600; text-align: center;
            letter-spacing: 1px; border: 1px solid #dde3ff;
        }

        .status {
            text-align: center; font-size: 13px; color: #aaa;
            margin: 6px 0 4px; min-height: 20px;
        }

        /* ===== 按钮 ===== */
        .btn-row { display: flex; gap: 10px; margin-top: 14px; }
        .btn {
            flex: 1; padding: 12px 0; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; letter-spacing: 0.5px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-refresh { background: #f0f4ff; color: #4a5acf; }
        .btn-refresh:hover { background: #dfe6ff; }

        /* ===== Toast ===== */
        .toast {
            margin-top: 14px; padding: 14px 16px; border-radius: 10px;
            font-size: 14px; font-weight: 600; text-align: center;
            display: none; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            0%   { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .toast.show { display: block; }
        .toast.ok   { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
        .toast.err  { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

        /* ===== Loading ===== */
        .loading-overlay {
            position: absolute; inset: 0;
            background: rgba(255,255,255,0.7);
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; z-index: 10;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #e0e0e0; border-top-color: #667eea;
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 成功/失败动画 ===== */
        @keyframes successPulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        @keyframes failShake {
            0%, 100% { transform: translateX(0); }
            20%      { transform: translateX(-6px); }
            40%      { transform: translateX(6px); }
            60%      { transform: translateX(-4px); }
            80%      { transform: translateX(4px); }
        }
        .animate-success { animation: successPulse 0.5s ease; }
        .animate-fail    { animation: failShake 0.4s ease; }

        /* 结果覆盖层 */
        .result-overlay {
            position: absolute; inset: 0; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            z-index: 8; pointer-events: none;
            opacity: 0; transition: opacity 0.3s;
        }
        .result-overlay.show { opacity: 1; }
        .result-overlay.ok  { background: rgba(5,150,105,0.25); }
        .result-overlay.err { background: rgba(220,38,38,0.25); }
        .result-overlay svg { width: 56px; height: 56px; }
    </style>
</head>
<body>

<div class="card">
    <div class="nav-links">
        <a href="index.html">&larr; 文字点选</a>
        <a href="rotate.html">旋转验证码 &rarr;</a>
    </div>

    <div class="card-header">
        <h2>滑动解锁验证码</h2>
        <p>请直接拖拽图片中的拼图块，将其移动到缺口位置</p>
    </div>

    <div style="text-align:center;">
        <div class="image-area" id="imageArea">
            <img id="bgImg" class="bg-img" src="" alt="背景图" width="320" height="160"/>
            <img id="pieceImg" class="slider-piece" src="" alt="拼图块"/>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
            </div>
            <div class="result-overlay" id="resultOverlay">
                <svg id="resultIcon" viewBox="0 0 24 24"></svg>
            </div>
        </div>
    </div>

    <div class="hint-bar" id="hintBar">加载中...</div>
    <div class="status" id="statusText"></div>

    <div class="btn-row">
        <button class="btn btn-refresh" id="refreshBtn">换一个</button>
    </div>

    <div class="toast" id="toast"></div>
</div>

<script>
(function () {
    'use strict';

    var API = 'http://127.0.0.1:8080/api/captcha/slider';

    var captchaId = null;
    var pieceY = 0;       // 拼图块在图片上的Y坐标（自然像素）
    var isDragging = false;
    var startX = 0;       // 鼠标按下时的clientX
    var startPieceLeft = 0; // 按下时拼图块的left值
    var currentPieceLeft = 0; // 当前拼图块left值（CSS像素）
    var verified = false;

    // DOM
    var bgImg         = document.getElementById('bgImg');
    var pieceImg      = document.getElementById('pieceImg');
    var imageArea     = document.getElementById('imageArea');
    var loadingEl     = document.getElementById('loadingOverlay');
    var hintBar       = document.getElementById('hintBar');
    var statusText    = document.getElementById('statusText');
    var toast         = document.getElementById('toast');
    var refreshBtn    = document.getElementById('refreshBtn');
    var resultOverlay = document.getElementById('resultOverlay');
    var resultIcon    = document.getElementById('resultIcon');

    function showLoading(show) { loadingEl.style.display = show ? 'flex' : 'none'; }

    function showToast(msg, type) {
        toast.textContent = msg;
        toast.className = 'toast show ' + type;
    }
    function hideToast() { toast.className = 'toast'; }

    function resetState() {
        currentPieceLeft = 0;
        pieceImg.style.left = '0px';
        verified = false;
        imageArea.classList.remove('success', 'fail', 'dragging', 'animate-success', 'animate-fail');
        pieceImg.classList.remove('dragging');
        resultOverlay.classList.remove('show', 'ok', 'err');
        hideToast();
        statusText.textContent = '';
    }

    // 加载验证码
    async function loadCaptcha() {
        resetState();
        showLoading(true);
        hintBar.textContent = '加载中...';
        statusText.textContent = '';

        try {
            var resp = await fetch(API + '/generate');
            var json = await resp.json();

            if (json.code === 200 && json.data) {
                var d = json.data;
                captchaId = d.captchaId;
                pieceY = d.y;

                bgImg.src = d.backgroundImage;
                pieceImg.src = d.sliderImage;

                bgImg.onload = function() {
                    var scaleY = bgImg.clientHeight / bgImg.naturalHeight;
                    var scaleX = bgImg.clientWidth / bgImg.naturalWidth;
                    // 设置拼图块垂直位置和尺寸
                    pieceImg.style.top = (pieceY * scaleY) + 'px';
                    pieceImg.style.width  = (56 * scaleX) + 'px';
                    pieceImg.style.height = (56 * scaleY) + 'px';
                    pieceImg.style.left = '0px';
                    currentPieceLeft = 0;
                };

                hintBar.textContent = '请拖拽拼图块到缺口位置';
                statusText.textContent = '直接拖动图片中的拼图块即可';
            } else {
                hintBar.textContent = '加载失败，请重试';
                showToast(json.message || '服务器异常', 'err');
            }
        } catch (e) {
            hintBar.textContent = '网络错误，请重试';
            showToast('无法连接到服务器', 'err');
        } finally {
            showLoading(false);
        }
    }

    // ===== 拖拽逻辑（直接拖拽拼图块） =====
    function onDragStart(e) {
        if (verified || !captchaId) return;
        e.preventDefault();
        e.stopPropagation();

        isDragging = true;
        var clientX = e.touches ? e.touches[0].clientX : e.clientX;
        startX = clientX;
        startPieceLeft = currentPieceLeft;

        pieceImg.classList.add('dragging');
        imageArea.classList.add('dragging');
    }

    function onDragMove(e) {
        if (!isDragging) return;
        e.preventDefault();

        var clientX = e.touches ? e.touches[0].clientX : e.clientX;
        var delta = clientX - startX;
        var newLeft = startPieceLeft + delta;

        // 限制范围：0 ~ 背景图宽度 - 拼图块宽度
        var maxLeft = bgImg.clientWidth - pieceImg.offsetWidth;
        if (newLeft < 0) newLeft = 0;
        if (newLeft > maxLeft) newLeft = maxLeft;

        currentPieceLeft = newLeft;
        pieceImg.style.left = currentPieceLeft + 'px';
    }

    async function onDragEnd(e) {
        if (!isDragging) return;
        isDragging = false;
        pieceImg.classList.remove('dragging');
        imageArea.classList.remove('dragging');

        if (!captchaId || verified) return;

        // 计算实际在图片自然尺寸上的X坐标
        var scaleX = bgImg.naturalWidth / bgImg.clientWidth;
        var actualX = Math.round(currentPieceLeft * scaleX);

        statusText.textContent = '验证中...';

        try {
            var resp = await fetch(API + '/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ captchaId: captchaId, x: actualX })
            });
            var json = await resp.json();

            if (json.code === 200) {
                verified = true;
                imageArea.classList.add('success', 'animate-success');
                resultOverlay.classList.add('show', 'ok');
                resultIcon.innerHTML = '<path fill="#059669" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>';
                showToast(json.message || '验证通过！', 'ok');
                statusText.textContent = '验证成功';
                setTimeout(loadCaptcha, 2000);
            } else {
                imageArea.classList.add('fail', 'animate-fail');
                resultOverlay.classList.add('show', 'err');
                resultIcon.innerHTML = '<path fill="#dc2626" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>';
                showToast(json.message || '验证失败', 'err');
                statusText.textContent = '验证失败，请重试';
                setTimeout(function() {
                    imageArea.classList.remove('fail', 'animate-fail');
                    resultOverlay.classList.remove('show', 'err');
                    // 重置拼图块位置
                    currentPieceLeft = 0;
                    pieceImg.style.left = '0px';
                    statusText.textContent = '直接拖动图片中的拼图块即可';
                }, 800);
            }
        } catch (e) {
            showToast('网络错误，请重试', 'err');
            currentPieceLeft = 0;
            pieceImg.style.left = '0px';
        }
    }

    // ===== 事件绑定（绑定到拼图块上） =====
    pieceImg.addEventListener('mousedown', onDragStart);
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);

    pieceImg.addEventListener('touchstart', onDragStart, { passive: false });
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('touchend', onDragEnd);

    refreshBtn.addEventListener('click', loadCaptcha);

    // 初始化
    loadCaptcha();
})();
</script>
</body>
</html>
